name: Build and push to nuget feed

on:
  push:
    branches:
      - master

jobs:
  build:

    runs-on: ${{ vars.ACTIONS_RUNNER }}

    steps:

      - name: Push metrics
        if: always()
        continue-on-error: true
        uses: perimeter-81/actions/actions/monitoring/push_metrics@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

    - uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2
    - name: Setup .NET
      uses: actions/setup-dotnet@871f041373faaad213a635d9afb62905ec029bbb # v1
      with:
        dotnet-version: 5.0.x
    - name: Restore dependencies
      run: dotnet restore
      working-directory: src
    - name: Build
      run: dotnet build -c Release --no-restore
      working-directory: src
    - name: Pack
      run: dotnet pack -c Release
      working-directory: src
    - name: Publish Nuget to GitHub registry
      run: dotnet nuget push src/Heijden.Dns/bin/Release/*.nupkg -k ${GITHUB_TOKEN} -s https://nuget.pkg.github.com/safervpn/index.json --skip-duplicate 
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}